<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#12141a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>MacroLoop</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="screen-loading" class="screen active">
    <div class="spinner" style="margin-top: 40vh;"></div>
  </div>

  <!-- Auth -->
  <div id="screen-auth" class="screen">
    <h1>MacroLoop</h1>
    <p>Track what you eat, without the guesswork.</p>
    <div class="card">
      <div class="field">
        <label for="auth-email">Email</label>
        <input type="email" id="auth-email" autocomplete="email" />
      </div>
      <div class="field">
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" autocomplete="current-password" />
      </div>
      <p class="error-text" id="auth-error" style="display:none;"></p>
      <button class="btn-primary" id="auth-submit">Sign in</button>
      <button class="btn-ghost" id="auth-toggle" style="width:100%; margin-top:8px;">Need an account? Create one</button>
    </div>
  </div>

  <!-- Onboarding -->
  <div id="screen-onboarding" class="screen">
    <h1>Let's set your target</h1>
    <p>Takes under two minutes.</p>

    <div id="onboarding-form">
      <div class="onboarding-step">
        <div class="step-label">Units</div>
        <div class="segmented" id="unit-toggle">
          <button type="button" data-value="metric" class="selected">Metric</button>
          <button type="button" data-value="imperial">Imperial</button>
        </div>
      </div>

      <div class="onboarding-step">
        <div class="step-label">About you</div>
        <div class="field">
          <label>Sex</label>
          <div class="segmented" id="sex-toggle">
            <button type="button" data-value="female" class="selected">Female</button>
            <button type="button" data-value="male">Male</button>
          </div>
        </div>
        <div class="field">
          <label for="age-input">Age</label>
          <input type="number" id="age-input" min="13" max="100" placeholder="30" />
        </div>
        <div class="field" id="height-metric-field">
          <label for="height-cm-input">Height (cm)</label>
          <input type="number" id="height-cm-input" placeholder="170" />
        </div>
        <div class="field" id="height-imperial-field" style="display:none;">
          <label>Height (ft / in)</label>
          <div style="display:flex; gap:10px;">
            <input type="number" id="height-ft-input" placeholder="5" style="flex:1;" />
            <input type="number" id="height-in-input" placeholder="7" style="flex:1;" />
          </div>
        </div>
        <div class="field" id="weight-metric-field">
          <label for="weight-kg-input">Weight (kg)</label>
          <input type="number" id="weight-kg-input" placeholder="70" />
        </div>
        <div class="field" id="weight-imperial-field" style="display:none;">
          <label for="weight-lb-input">Weight (lb)</label>
          <input type="number" id="weight-lb-input" placeholder="154" />
        </div>
      </div>

      <div class="onboarding-step">
        <div class="step-label">Activity</div>
        <div class="field">
          <label for="activity-select">Typical activity level</label>
          <select id="activity-select">
            <option value="sedentary">Sedentary — little to no exercise</option>
            <option value="light">Light — exercise 1-3 days/week</option>
            <option value="moderate" selected>Moderate — exercise 3-5 days/week</option>
            <option value="active">Active — exercise 6-7 days/week</option>
            <option value="very_active">Very active — physical job or 2x/day training</option>
          </select>
        </div>
      </div>

      <div class="onboarding-step">
        <div class="step-label">Goal</div>
        <div class="field">
          <div class="segmented" id="goal-toggle">
            <button type="button" data-value="lose">Lose</button>
            <button type="button" data-value="maintain" class="selected">Maintain</button>
            <button type="button" data-value="gain">Gain</button>
          </div>
        </div>
        <div class="field" id="rate-field" style="display:none;">
          <label for="rate-input">Target rate (% bodyweight/week)</label>
          <input type="number" id="rate-input" step="0.1" value="0.75" min="0.1" max="2" />
        </div>
      </div>

      <p class="error-text" id="onboarding-error" style="display:none;"></p>
      <button class="btn-primary" id="onboarding-calculate">Calculate my target</button>
    </div>

    <div id="onboarding-result" style="display:none;">
      <div class="card result-card">
        <div class="target-number numeric" id="result-target">0</div>
        <div class="target-unit">kcal/day</div>
        <p id="result-explanation"></p>
        <p class="error-text" id="result-warning" style="display:none;"></p>
      </div>
      <button class="btn-primary" id="onboarding-confirm">Get started</button>
    </div>
  </div>

  <!-- Today -->
  <div id="screen-today" class="screen">
    <div class="top-bar">
      <div class="brand">MacroLoop</div>
      <button class="btn-icon" id="sign-out-btn" title="Sign out" aria-label="Sign out">&#9211;</button>
    </div>

    <div class="ring-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle cx="110" cy="110" r="95" fill="none" stroke="#242833" stroke-width="14" />
        <circle id="ring-progress" cx="110" cy="110" r="95" fill="none" stroke="#e8a94c" stroke-width="14"
          stroke-linecap="round" transform="rotate(-90 110 110)"
          stroke-dasharray="596.9" stroke-dashoffset="596.9" style="transition: stroke-dashoffset 0.5s ease;" />
      </svg>
      <div class="ring-center">
        <div class="ring-number numeric" id="ring-remaining">0</div>
        <div class="ring-label">kcal remaining</div>
      </div>
    </div>

    <div class="macro-row">
      <div class="macro-item macro-protein">
        <div class="macro-label"><span>Protein</span><span class="numeric" id="protein-label">0/0g</span></div>
        <div class="macro-bar-track"><div class="macro-bar-fill" id="protein-bar" style="width:0%;"></div></div>
      </div>
      <div class="macro-item macro-carb">
        <div class="macro-label"><span>Carbs</span><span class="numeric" id="carb-label">0/0g</span></div>
        <div class="macro-bar-track"><div class="macro-bar-fill" id="carb-bar" style="width:0%;"></div></div>
      </div>
      <div class="macro-item macro-fat">
        <div class="macro-label"><span>Fat</span><span class="numeric" id="fat-label">0/0g</span></div>
        <div class="macro-bar-track"><div class="macro-bar-fill" id="fat-bar" style="width:0%;"></div></div>
      </div>
    </div>

    <div class="quick-add-row">
      <button id="open-search-btn">🔍 Search</button>
      <button id="open-recent-btn">⭐ Recent</button>
    </div>

    <h3>Today's log</h3>
    <div id="food-log-list"></div>

    <!--
      Phase 2 adds a second real destination (exercise log), which is
      the natural point to introduce a persistent bottom nav — adding
      nav chrome now, with only one working tab, would be worse UX than
      the single-screen-plus-sheet flow this is today.
    -->
  </div>

  <!-- Log Meal sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="log-meal-sheet" style="display:none;">
    <div class="top-bar">
      <h3 id="sheet-title" style="margin:0;">Add food</h3>
      <button class="btn-icon" id="sheet-close" aria-label="Close">&times;</button>
    </div>

    <div id="sheet-search-view">
      <div class="field">
        <input type="text" id="search-input" placeholder="Search foods (e.g. chicken breast)" />
      </div>
      <div id="search-results"></div>
    </div>

    <div id="sheet-detail-view" style="display:none;">
      <h3 id="detail-name"></h3>
      <p class="numeric" id="detail-per-100g"></p>
      <div class="quantity-stepper">
        <button class="btn-icon" id="qty-minus" aria-label="Decrease">&minus;</button>
        <input type="number" id="qty-grams" value="100" />
        <button class="btn-icon" id="qty-plus" aria-label="Increase">+</button>
      </div>
      <p style="text-align:center;" class="numeric" id="detail-scaled"></p>
      <button class="btn-primary" id="confirm-log-btn">Log it</button>
      <button class="btn-ghost" id="back-to-search" style="width:100%;">&larr; Back to search</button>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none;"></div>
</div>

<script type="module">
window.onerror = (msg, src, line, col, err) => {
  alert(msg + "\n" + src + ":" + line);
};
  import {
    onAuthChange, signUp, signIn, signOutUser,
    getProfile, saveProfile,
    saveWeightEntry, getLatestWeight,
    getFoodLogForDate, deleteFoodLogEntry,
    saveAlgorithmState, recordAlgorithmHistory,
  } from './js/firebase.js';
  import { getState, setState, patchState, subscribe, todayLocalDate } from './js/state.js';
  import {
    calculateBMR, calculateTDEE, calculateTarget, explainTarget,
    calculateMacroTargets, lbToKg, ftInToCm,
  } from './js/algorithm.js';
  import { searchFoods, debounce, logFood, scaleToGrams, getFrequentFoodsSorted } from './js/food-log.js';

  // ---- Screen management ----

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach((el) => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  let toastTimer;
  function showToast(msg, ms = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, ms);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- Auth ----

  let authMode = 'signin';
  document.getElementById('auth-toggle').addEventListener('click', () => {
    authMode = authMode === 'signin' ? 'signup' : 'signin';
    document.getElementById('auth-submit').textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
    document.getElementById('auth-toggle').textContent =
      authMode === 'signin' ? 'Need an account? Create one' : 'Already have an account? Sign in';
  });

  function friendlyAuthError(err) {
    const code = err.code || '';
    if (code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password.';
    if (code.includes('email-already-in-use')) return 'That email already has an account — try signing in instead.';
    if (code.includes('weak-password')) return 'Password should be at least 6 characters.';
    if (code.includes('invalid-email')) return 'That email address looks invalid.';
    return 'Something went wrong. Please try again.';
  }

  async function submitAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errorEl = document.getElementById('auth-error');
    errorEl.style.display = 'none';
    try {
      if (authMode === 'signin') await signIn(email, password);
      else await signUp(email, password);
    } catch (err) {
      errorEl.textContent = friendlyAuthError(err);
      errorEl.style.display = 'block';
    }
  }
  document.getElementById('auth-submit').addEventListener('click', submitAuth);
  document.getElementById('auth-password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitAuth();
  });

  // ---- Onboarding ----

  let onboardingUnit = 'metric';
  let onboardingSex = 'female';
  let onboardingGoal = 'maintain';
  let lastComputed = null;

  function wireSegmented(containerId, onSelect) {
    const container = document.getElementById(containerId);
    container.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', () => {
        container.querySelectorAll('button').forEach((b) => b.classList.remove('selected'));
        btn.classList.add('selected');
        onSelect(btn.dataset.value);
      });
    });
  }

  wireSegmented('unit-toggle', (v) => {
    onboardingUnit = v;
    const metric = v === 'metric';
    document.getElementById('height-metric-field').style.display = metric ? 'block' : 'none';
    document.getElementById('height-imperial-field').style.display = metric ? 'none' : 'block';
    document.getElementById('weight-metric-field').style.display = metric ? 'block' : 'none';
    document.getElementById('weight-imperial-field').style.display = metric ? 'none' : 'block';
  });
  wireSegmented('sex-toggle', (v) => { onboardingSex = v; });
  wireSegmented('goal-toggle', (v) => {
    onboardingGoal = v;
    document.getElementById('rate-field').style.display = v === 'maintain' ? 'none' : 'block';
  });

  function readOnboardingInputs() {
    const age = Number(document.getElementById('age-input').value);
    let heightCm, weightKg;
    if (onboardingUnit === 'metric') {
      heightCm = Number(document.getElementById('height-cm-input').value);
      weightKg = Number(document.getElementById('weight-kg-input').value);
    } else {
      const ft = Number(document.getElementById('height-ft-input').value);
      const inch = Number(document.getElementById('height-in-input').value);
      heightCm = ftInToCm(ft, inch);
      weightKg = lbToKg(Number(document.getElementById('weight-lb-input').value));
    }
    const activityLevel = document.getElementById('activity-select').value;
    const ratePercent = onboardingGoal === 'maintain' ? 0.75 : Number(document.getElementById('rate-input').value);
    return {
      age, heightCm, weightKg, activityLevel, ratePercent,
      sex: onboardingSex, goal: onboardingGoal, unit_pref: onboardingUnit,
    };
  }

  document.getElementById('onboarding-calculate').addEventListener('click', () => {
    const errorEl = document.getElementById('onboarding-error');
    errorEl.style.display = 'none';
    const input = readOnboardingInputs();

    if (!input.age || input.age < 13 || input.age > 100 || !input.heightCm || !input.weightKg) {
      errorEl.textContent = 'Please fill in your age, height, and weight.';
      errorEl.style.display = 'block';
      return;
    }

    const bmr = calculateBMR({ sex: input.sex, weightKg: input.weightKg, heightCm: input.heightCm, age: input.age });
    const tdee = calculateTDEE(bmr, input.activityLevel);
    const { target, warning } = calculateTarget({
      tdee, goal: input.goal, weightKg: input.weightKg, sex: input.sex, ratePercent: input.ratePercent,
    });
    const explanation = explainTarget({ bmr, tdee, target, goal: input.goal });

    lastComputed = { input, bmr, tdee, target, warning };

    document.getElementById('result-target').textContent = target;
    document.getElementById('result-explanation').textContent = explanation;
    const warningEl = document.getElementById('result-warning');
    if (warning) {
      warningEl.textContent = warning;
      warningEl.style.display = 'block';
    } else {
      warningEl.style.display = 'none';
    }

    document.getElementById('onboarding-form').style.display = 'none';
    document.getElementById('onboarding-result').style.display = 'block';
  });

  document.getElementById('onboarding-confirm').addEventListener('click', async () => {
    const user = getState('user');
    if (!user || !lastComputed) return;
    const { input, target, tdee } = lastComputed;
    const macros = calculateMacroTargets(target, input.weightKg);
    const date = todayLocalDate();

    const profile = {
      sex: input.sex,
      age: input.age,
      height_cm: input.heightCm,
      activity_level: input.activityLevel,
      goal: input.goal,
      rate_percent: input.ratePercent,
      unit_pref: input.unit_pref,
      premium_status: false,
    };

    await saveProfile(user.uid, profile);
    await saveWeightEntry(user.uid, date, input.weightKg);
    await saveAlgorithmState(user.uid, {
      current_tdee_estimate: Math.round(tdee),
      mode: 'learning',
      last_recalculated: new Date().toISOString(),
    });
    await recordAlgorithmHistory(user.uid, date, { tdee_estimate: Math.round(tdee), mode: 'learning' });

    setState('profile', profile);
    patchState('today', { date, target, macros, foodEntries: {} });
    showScreen('screen-today');
  });

  // ---- Today ----

  subscribe('today', renderToday);

  async function loadAndRenderToday() {
    const user = getState('user');
    const profile = getState('profile');
    const weightKg = await getLatestWeight(user.uid);

    const bmr = calculateBMR({ sex: profile.sex, weightKg, heightCm: profile.height_cm, age: profile.age });
    const tdee = calculateTDEE(bmr, profile.activity_level);
    const { target } = calculateTarget({
      tdee, goal: profile.goal, weightKg, sex: profile.sex, ratePercent: profile.rate_percent ?? 0.75,
    });
    const macros = calculateMacroTargets(target, weightKg);

    const date = todayLocalDate();
    const foodEntries = await getFoodLogForDate(user.uid, date);

    patchState('today', { date, target, macros, foodEntries });
  }

  function renderToday() {
    const today = getState('today');
    if (!today.target) return; // not loaded yet

    const entries = Object.values(today.foodEntries || {});
    const consumed = entries.reduce((sum, e) => sum + (e.calories || 0), 0);
    const proteinC = entries.reduce((s, e) => s + (e.protein_g || 0), 0);
    const carbC = entries.reduce((s, e) => s + (e.carbs_g || 0), 0);
    const fatC = entries.reduce((s, e) => s + (e.fat_g || 0), 0);

    document.getElementById('ring-remaining').textContent = Math.round(today.target - consumed);

    const circumference = 596.9;
    const fraction = today.target > 0 ? Math.min(consumed / today.target, 1) : 0;
    document.getElementById('ring-progress').style.strokeDashoffset = circumference * (1 - fraction);

    updateMacroBar('protein', proteinC, today.macros.proteinG);
    updateMacroBar('carb', carbC, today.macros.carbG);
    updateMacroBar('fat', fatC, today.macros.fatG);

    renderFoodLogList(today.foodEntries);
  }

  function updateMacroBar(key, consumed, target) {
    document.getElementById(`${key}-label`).textContent = `${Math.round(consumed)}/${target}g`;
    const pct = target > 0 ? Math.min((consumed / target) * 100, 100) : 0;
    document.getElementById(`${key}-bar`).style.width = `${pct}%`;
  }

  function renderFoodLogList(entriesMap) {
    const container = document.getElementById('food-log-list');
    const entries = Object.entries(entriesMap || {});
    if (entries.length === 0) {
      container.innerHTML = '<div class="empty-state">Nothing logged yet today. Tap Search to add your first meal.</div>';
      return;
    }
    container.innerHTML = entries
      .map(([id, e]) => `
        <div class="log-entry">
          <div>
            <div class="entry-name">${escapeHtml(e.name)}</div>
            <div class="entry-meta">${e.grams}g</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="entry-cal">${e.calories} kcal</div>
            <button class="entry-delete" data-id="${id}" aria-label="Delete entry">&times;</button>
          </div>
        </div>
      `)
      .join('');

    container.querySelectorAll('.entry-delete').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const user = getState('user');
        await deleteFoodLogEntry(user.uid, todayLocalDate(), btn.dataset.id);
        await loadAndRenderToday();
      });
    });
  }

  document.getElementById('sign-out-btn').addEventListener('click', async () => {
    await signOutUser();
  });

  // ---- Log Meal sheet ----

  let selectedFoodItem = null;

  function openSheet(mode) {
    document.getElementById('sheet-backdrop').classList.add('active');
    document.getElementById('log-meal-sheet').style.display = 'block';
    document.getElementById('sheet-detail-view').style.display = 'none';
    document.getElementById('sheet-search-view').style.display = 'block';
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('search-input').value = '';

    if (mode === 'recent') {
      document.getElementById('sheet-title').textContent = 'Recent foods';
      loadRecent();
    } else {
      document.getElementById('sheet-title').textContent = 'Search foods';
      document.getElementById('search-input').focus();
    }
  }

  function closeSheet() {
    document.getElementById('sheet-backdrop').classList.remove('active');
    document.getElementById('log-meal-sheet').style.display = 'none';
  }

  document.getElementById('open-search-btn').addEventListener('click', () => openSheet('search'));
  document.getElementById('open-recent-btn').addEventListener('click', () => openSheet('recent'));
  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
  document.getElementById('back-to-search').addEventListener('click', () => {
    document.getElementById('sheet-detail-view').style.display = 'none';
    document.getElementById('sheet-search-view').style.display = 'block';
  });

  async function loadRecent() {
    const user = getState('user');
    const results = document.getElementById('search-results');
    results.innerHTML = '<div class="spinner"></div>';
    const frequent = await getFrequentFoodsSorted(user.uid);
    if (frequent.length === 0) {
      results.innerHTML = '<div class="empty-state">No frequent foods yet — search once and it will show up here.</div>';
      return;
    }
    renderResults(frequent.slice(0, 20).map((f) => ({
      id: f.id,
      name: f.name,
      source: 'frequent',
      caloriesPer100g: f.caloriesPer100g,
      proteinPer100g: f.proteinPer100g,
      carbsPer100g: f.carbsPer100g,
      fatPer100g: f.fatPer100g,
      defaultGrams: f.defaultGrams || 100,
    })));
  }

  const debouncedSearch = debounce(async (text) => {
    const results = document.getElementById('search-results');
    if (!text.trim()) { results.innerHTML = ''; return; }
    results.innerHTML = '<div class="spinner"></div>';
    try {
      const items = await searchFoods(text.trim());
      if (items.length === 0) {
        results.innerHTML = '<div class="empty-state">No matches. Try a simpler search term.</div>';
      } else {
        renderResults(items);
      }
    } catch (err) {
      results.innerHTML = '<div class="empty-state">Search failed — check your connection and try again.</div>';
    }
  }, 600);
  document.getElementById('search-input').addEventListener('input', (e) => debouncedSearch(e.target.value));

  function renderResults(items) {
    const results = document.getElementById('search-results');
    results.innerHTML = items
      .map((item, i) => `
        <div class="search-result" data-index="${i}">
          <div>
            <div>${escapeHtml(item.name)}</div>
            <div class="result-source">${item.source} · ${Math.round(item.caloriesPer100g)} kcal/100g</div>
          </div>
          <div>&rsaquo;</div>
        </div>
      `)
      .join('');
    results.querySelectorAll('.search-result').forEach((el) => {
      el.addEventListener('click', () => selectFood(items[Number(el.dataset.index)]));
    });
  }

  function selectFood(item) {
    selectedFoodItem = item;
    document.getElementById('sheet-search-view').style.display = 'none';
    document.getElementById('sheet-detail-view').style.display = 'block';
    document.getElementById('detail-name').textContent = item.name;
    document.getElementById('detail-per-100g').textContent =
      `${Math.round(item.caloriesPer100g)} kcal · ${item.proteinPer100g}p / ${item.carbsPer100g}c / ${item.fatPer100g}f per 100g`;
    document.getElementById('qty-grams').value = item.defaultGrams || 100;
    updateScaledPreview();
  }

  function updateScaledPreview() {
    const grams = Number(document.getElementById('qty-grams').value) || 0;
    const scaled = scaleToGrams(selectedFoodItem, grams);
    document.getElementById('detail-scaled').textContent =
      `${scaled.calories} kcal · ${scaled.protein_g}p / ${scaled.carbs_g}c / ${scaled.fat_g}f`;
  }
  document.getElementById('qty-grams').addEventListener('input', updateScaledPreview);
  document.getElementById('qty-minus').addEventListener('click', () => {
    const el = document.getElementById('qty-grams');
    el.value = Math.max(0, Number(el.value) - 10);
    updateScaledPreview();
  });
  document.getElementById('qty-plus').addEventListener('click', () => {
    const el = document.getElementById('qty-grams');
    el.value = Number(el.value) + 10;
    updateScaledPreview();
  });

  document.getElementById('confirm-log-btn').addEventListener('click', async () => {
    const user = getState('user');
    const grams = Number(document.getElementById('qty-grams').value);
    if (!selectedFoodItem || !grams || grams <= 0) return;
    await logFood(user.uid, todayLocalDate(), selectedFoodItem, grams);
    closeSheet();
    showToast(`Logged ${selectedFoodItem.name}`);
    await loadAndRenderToday();
  });

  // ---- Boot ----

  onAuthChange(async (user) => {
    setState('user', user);
    if (!user) {
      showScreen('screen-auth');
      return;
    }
    try {
      const profile = await getProfile(user.uid);
      if (!profile) {
        showScreen('screen-onboarding');
        return;
      }
      setState('profile', profile);
      await loadAndRenderToday();
      showScreen('screen-today');
    } catch (err) {
      console.error(err);
      showToast('Could not load your data — check your connection.');
    }
  });
</script>
</body>
</html>
